server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Handle React/Vite Client-Side Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy the GraphQL API
    # This matches the VITE_API_URL=/graphql we discussed
    location /graphql {
        proxy_pass http://api-server:3000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api {
        proxy_pass http://api-server:3000;
        proxy_set_header Host $host;
    }

    # Optional: Cache static assets for better performance
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
