version: '3.8'

services:
  # 1. Couchbase Database
  db:
    image: couchbase/server:enterprise-7.2.0
    container_name: reservation-db
    hostname: db
    ports:
      - "8091-8096:8091-8096"
      - "11210-11211:11210-11211"
    environment:
      - COUCHBASE_ADMIN_USERNAME=admin
      - COUCHBASE_ADMIN_PASSWORD=000000
      - couchbase_data:/opt/couchbase/var
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g

  # 2. NestJS API Server
  api-server:
    image: rsv-server:latest
    container_name: reservation-api
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - NODE_ENV=production
      # Use 'db' (the service name) as the hostname instead of localhost
      - COUCHBASE_URL=couchbase://10.255.2.2
      - COUCHBASE_USER=admin
      - COUCHBASE_PASS=000000
      - COUCHBASE_BUCKET=bucket_reservations
      - JWT_SECRET=JWT_SECRET_KEY_2026
      - EMPLOYEE_REGISTRATION_CODE=EMP2026
      - CORS_ORIGINS=http://localhost:4200
    depends_on:
      - db

  # 3. React Web Client
  web-client:
    image: rsv-web:latest
    container_name: reservation-ui
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=/graphql
    depends_on:
      - api-server

volumes:
  couchbase_data: